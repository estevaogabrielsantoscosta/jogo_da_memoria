<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Cabeçalho do jogo-->
    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold">
                <i class="bi bi-grid-3x3-gap-fill text-white"> Memory Game</i>
            </h1>
                <p class="text-white-50">Encontre pares e vença o relógio</p>
        </div>
    
    <!--Painel de estatísticas-->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="game-card p-3 text-center">
                <i class="bi bi-stopwatch fs-3 text-primary"></i>
                <h6 class="mb-0">Tempo</h6>
                <span class="stat-value" id="timer">00:00</span>
            </div>    
        </div>
        <div class="col-md-3">
            <div class="game-card p-3 text-center">
                <i class="bi bi-arrows-move fs-3 text-success"></i>
                <h6 class="mb-0">Movimentos</h6>
                <span class="stat-value" id="moves">0</span>
            </div>
        </div>
        <div class="col-md-3">
            <div class="game-card p-3 text-center">
                <i class="bi bi-trophy fs-3 text-warning"></i>
                <h6 class="mb-0">Pontuação</h6>
                <span class="stat-value" id="score">0</span>
            </div>
        </div>
        <div class="col-md-3">
            <div class="game-card p-3 text-center">
                <i class="bi bi-bar-chart fs-3 text-info"></i>
                <h6 class="mb-0">Nível</h6>
                <span class="stat-value" id="level">1</span>
            </div>
        </div>
    </div>
    <!--Painel de controle de jogo-->
    <div class="game-card p-3 mb-4">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="btn-group w-100" role="group">
                    <button class="btn btn-outline-primary" onclick="startGame(4)">
                        <i class="bi bi-grid"></i> 4x4(Fácil)
                    </button>
                    <button class="btn btn-outline-primary" onclick="startGame(6)">
                        <i class="bi bi-grid-3x3"></i> 6x6(Difícil)
                    </button>
                    <button class="btn btn-outline-success" onclick="resetGame()">
                        <i class="bi bi-arrow-repeat"></i> Reiniciar
                    </button>
                </div>
            </div>
            <div class="col-md-6 text-end">
                <div class="form-check form-switch">
                    <label class="form-check-label" for="soundToggle">
                        <input class="form-check-input" type="checkbox" id="soundToggle">
                        <i class="bi bi-volume-up"></i>Sons
                    </label>
                </div>
            </div>
        </div>
    </div>
    <!--Tabuleiro do jogo onde as cartas serão renderizadas-->
        <div class="game-card p-4">
            <div class="row" id="gameBoard">
                <div class="col-12 text-center py-5">
                    <i class="bi bi-joystick fs-1"></i>
                    <p class="mt-2">Clique em um nível para começar</p>
                </div>
            </div>
        </div>
    <!--Modal(tela) de vitória / pop-up que aparece ao ganhar-->  
        <!--Modal(tela) de vitória / pop-up que aparece ao ganhar-->  
    <div class="modal fade" id="victoryModal" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">🎉 Parabéns!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <i class="bi bi-emoji-wink fs-1"></i>
                    <h3>Você venceu!</h3>
                    <div id="victoryStats" class="mt-3"></div> <!-- CORRIGIDO: div em vez de p -->
                    <div class="alert alert-info">
                        Pontuação total: <strong id="finalScore">0</strong>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="resetGame()">Jogar novamente</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>    
        </div>        
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
